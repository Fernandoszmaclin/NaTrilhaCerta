{% load static %}
<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <img src="{% static 'img/logo.png' %}" alt="Na Trilha Certa Logo" width="105" height="105">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Abrir menu de navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="{% url 'expedicoes' %}">Expedições</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#sobre">Empresa</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'contato' %}">Contato</a></li>
            </ul>
            <div class="ms-lg-4 mt-3 mt-lg-0 d-flex gap-2">
                {% if user.is_authenticated %}
                <div class="dropdown">
                    <button class="btn btn-outline-amarelo dropdown-toggle" type="button" data-bs-toggle="dropdown" id="userDropdown" aria-expanded="false">
                        <i class="bi bi-person-fill me-1" aria-hidden="true"></i>{{ user.first_name|default:user.username }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="{% url 'minhas_reservas' %}"><i class="bi bi-journal-bookmark-fill me-2" aria-hidden="true"></i>Minhas Reservas</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form method="post" action="{% url 'logout' %}" class="m-0">
                                {% csrf_token %}
                                <button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right me-2" aria-hidden="true"></i>Sair</button>
                            </form>
                        </li>
                    </ul>
                </div>
                {% else %}
                <button class="btn btn-outline-amarelo" data-bs-toggle="modal" data-bs-target="#authModal" id="btnLogin">
                    <i class="bi bi-person-fill me-1" aria-hidden="true"></i>Login
                </button>
                {% endif %}
                <a href="https://api.whatsapp.com/send/?phone=555497145614&text&type=phone_number&app_absent=0&utm_source=ig" target="_blank" rel="noopener" class="btn btn-primario"><i class="bi bi-whatsapp me-2" aria-hidden="true"></i>Atendimento</a>
            </div>
        </div>
    </div>
</nav>
